<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Financeiro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: linear-gradient(135deg, #1a6640 0%, #145533 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      width: 100%;
      max-width: 400px;
      padding: 40px;
    }
    .logo {
      text-align: center;
      margin-bottom: 30px;
      font-size: 3rem;
    }
    h1 {
      font-size: 1.8rem;
      color: #1c1a17;
      margin-bottom: 10px;
      font-weight: 400;
      font-family: 'DM Serif Display', serif;
    }
    .subtitle {
      font-size: 0.875rem;
      color: #7a7268;
      margin-bottom: 30px;
    }
    .field {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #7a7268;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #e2ddd5;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: #1c1a17;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus {
      border-color: #1a6640;
      background: #f7f5f0;
    }
    input.erro {
      border-color: #d94f4f;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #1a6640;
      color: white;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 10px;
    }
    button:hover {
      background: #145533;
      transform: translateY(-1px);
    }
    button:active {
      transform: translateY(0);
    }
    .erro-msg {
      color: #d94f4f;
      font-size: 0.875rem;
      margin-top: 10px;
      display: none;
    }
    .erro-msg.show {
      display: block;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="logo">🌿</div>
  <h1>Bem-vindo</h1>
  <p class="subtitle">Controle Financeiro para Terapeutas</p>

  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="ex: alex@example.com" onkeydown="if(event.key==='Enter')login()">
  </div>

  <div class="field">
    <label>Senha</label>
    <input type="password" id="senha" placeholder="sua senha" onkeydown="if(event.key==='Enter')login()">
  </div>

  <button onclick="login()">Entrar</button>

  <div class="erro-msg" id="erro-msg"></div>
</div>

<script>
const SB_URL = 'https://xdnepxhnleciszlgudqq.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhkbmVweGhubGVjaXN6bGd1ZHFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NDA1MTUsImV4cCI6MjA5MzQxNjUxNX0.p7ztpfdyoFp57VMw_m3XL5WjHuybCDSjR6H_CFgcLGg';

function sbHeaders() {
  return {
    'Content-Type': 'application/json',
    'apikey': SB_ANON,
    'Authorization': 'Bearer ' + SB_ANON
  };
}

function login() {
  var email = document.getElementById('email').value.trim();
  var senha = document.getElementById('senha').value;
  var erroEl = document.getElementById('erro-msg');

  if (!email || !senha) {
    erroEl.textContent = 'Preencha email e senha.';
    erroEl.classList.add('show');
    return;
  }

  erroEl.classList.remove('show');

  // Chama RPC autenticar_usuario
  fetch(SB_URL + '/rest/v1/rpc/autenticar_usuario', {
    method: 'POST',
    headers: sbHeaders(),
    body: JSON.stringify({
      email_input: email,
      senha_input: senha
    })
  })
  .then(function(r) {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  })
  .then(function(data) {
    // data = { sucesso, usuario_id, nome, email, mensagem }
    if (!data || !data.sucesso) {
      erroEl.textContent = data && data.mensagem ? data.mensagem : 'Email ou senha inválidos.';
      erroEl.classList.add('show');
      return;
    }

    // ✅ IMPORTANTE: Limpar dados locais ANTES de fazer login com novo usuário
    try {
      // Limpar TODOS os dados do usuário anterior
      localStorage.clear(); // Apaga cache local completamente
      sessionStorage.clear(); // Apaga toda a session anterior
    } catch(e) {}

    // Salvar dados do novo usuário
    sessionStorage.setItem('usuario_id', data.usuario_id);
    sessionStorage.setItem('usuario_nome', data.nome);
    sessionStorage.setItem('usuario_email', data.email);

    // Redirecionar para dashboard
    window.location.href = 'dashboard.html';
  })
  .catch(function(e) {
    erroEl.textContent = 'Erro de conexão: ' + e.message;
    erroEl.classList.add('show');
    console.error('Login error:', e);
  });
}

// Ao carregar a página, se já estiver logado, vai pro dashboard
window.addEventListener('DOMContentLoaded', function() {
  if (sessionStorage.getItem('usuario_id')) {
    window.location.href = 'dashboard.html';
  }
});
</script>

</body>
</html>
