<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - App Financeira</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .login-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }

    .logo {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo h1 {
      font-size: 28px;
      color: #333;
      margin-bottom: 8px;
    }

    .logo p {
      color: #999;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
    }

    input::placeholder {
      color: #bbb;
    }

    .btn-login {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 10px;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .error-message {
      background: #fee;
      border: 1px solid #fcc;
      color: #c33;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top: 3px solid white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .demo-users {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid #eee;
      font-size: 13px;
      color: #999;
    }

    .demo-users p {
      margin-bottom: 8px;
      font-weight: 600;
    }

    .demo-users code {
      background: #f5f5f5;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <h1>💰 Financeira</h1>
      <p>App de Controle Financeiro</p>
    </div>

    <div class="error-message" id="errorMsg"></div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email" 
          placeholder="seu@email.com" 
          required
        >
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>
        <input 
          type="password" 
          id="senha" 
          placeholder="Sua senha" 
          required
        >
      </div>

      <button type="submit" class="btn-login" id="btnLogin">
        Acessar
      </button>
    </form>

    <div class="demo-users">
      <p>👤 Usuários de Teste:</p>
      <p><code>alex@possato.com</code></p>
      <p><code>lu@cerqueira.com</code></p>
    </div>
  </div>

  <script>
    // 🔧 CONFIGURAÇÃO SUPABASE
    const SUPABASE_URL = 'https://xdnepxhnleciszlgudqq.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_yBFSiSw58lV-nHZR1LBcvQ_CpxsuYHo';
    const SUPABASE_RPC = 'autenticar_usuario';

    // 🔄 Rota da app (após login bem-sucedido)
    const APP_ROUTE = 'dashboard.html'; // ou 'https://alexpossato-netizen.github.io/financeiro/'

    async function handleLogin(e) {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;
      const errorMsg = document.getElementById('errorMsg');
      const btnLogin = document.getElementById('btnLogin');

      // Limpar mensagem de erro anterior
      errorMsg.classList.remove('show');

      // Desabilitar botão e mostrar loading
      btnLogin.disabled = true;
      const originalText = btnLogin.innerHTML;
      btnLogin.innerHTML = '<span class="loading"></span>Autenticando...';

      try {
        // Fazer RPC call para autenticar
        const response = await fetch(
          `${SUPABASE_URL}/rest/v1/rpc/autenticar_usuario`,
          {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'apikey': SUPABASE_KEY,
              'Authorization': `Bearer ${SUPABASE_KEY}`
            },
            body: JSON.stringify({
              email_input: email,
              senha_input: senha
            })
          }
        );

        if (!response.ok) {
          throw new Error(`Erro HTTP: ${response.status}`);
        }

        const data = await response.json();

        if (!data || data.length === 0) {
          showError('Usuário não encontrado. Verifique seu email.');
          resetButton(btnLogin, originalText);
          return;
        }

        const resultado = data[0];

        if (resultado.sucesso) {
          // ✅ Login bem-sucedido!
          // Guardar dados na sessão (logout ao fechar aba)
          sessionStorage.setItem('usuario_id', resultado.usuario_id);
          sessionStorage.setItem('usuario_nome', resultado.nome);
          sessionStorage.setItem('usuario_email', email);

          // Redirecionar para app
          setTimeout(() => {
            window.location.href = APP_ROUTE;
          }, 300);
        } else {
          // ❌ Credenciais inválidas
          showError(resultado.mensagem || 'Email ou senha inválidos.');
          resetButton(btnLogin, originalText);
        }
      } catch (error) {
        console.error('Erro de autenticação:', error);
        showError(`Erro ao conectar: ${error.message}`);
        resetButton(btnLogin, originalText);
      }
    }

    function showError(msg) {
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.textContent = msg;
      errorMsg.classList.add('show');
    }

    function resetButton(btn, text) {
      btn.disabled = false;
      btn.innerHTML = text;
    }

    // Desabilitar autofill maluco do navegador
    document.getElementById('email').addEventListener('autofill', function() {
      this.style.transition = 'background-color 5000s ease-in-out 0s';
    });

    document.getElementById('email').addEventListener('blur', function() {
      this.style.transition = '';
    });
  </script>
</body>
</html>
